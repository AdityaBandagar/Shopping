<!DOCTYPE html>
<html>
<head>
<title>Pro Shopping Website</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.nav {
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.login-box {
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

.menu {
    display:none;
    text-align:center;
    padding:10px;
    background:white;
}

.menu button {
    padding:10px 15px;
    margin:5px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:5px;
}

.page { display:none; }
.active { display:block; }

.products {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:white;
    width:220px;
    margin:15px;
    padding:10px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:8px;
}

button {
    padding:10px;
    margin-top:8px;
    cursor:pointer;
    background:#ff9f00;
    color:white;
    border:none;
    border-radius:5px;
}

input, select {
    padding:8px;
    margin:5px;
}

.admin-box {
    text-align:center;
    margin:20px;
}
</style>

</head>

<body>

<div class="nav">🛒 Pro Shopping Website</div>

<!-- LOGIN -->
<div id="login" class="page active">
    <div class="login-box">
        <h2>Login</h2>
        <input id="user" placeholder="Username"><br><br>
        <input id="pass" type="password" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
    <button onclick="showCategory('mobile')">Mobiles</button>
    <button onclick="showCategory('electronics')">Electronics</button>
    <button onclick="showCategory('school')">School</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
    <h2 style="text-align:center;">Admin Panel</h2>

    <div class="admin-box">
        <input id="pname" placeholder="Product Name">
        <input id="pprice" placeholder="Price">
        <input id="pimg" placeholder="Image URL">
        <select id="pcat">
            <option value="mobile">Mobile</option>
            <option value="electronics">Electronics</option>
            <option value="school">School</option>
        </select>
        <br>
        <button onclick="addProduct()">Add Product</button>
    </div>

    <div class="products" id="adminList"></div>
</div>

<!-- PRODUCTS -->
<div id="home" class="page">
    <div class="products" id="productList"></div>
</div>

<script>

// LOAD DATA
let products = JSON.parse(localStorage.getItem("products")) || {
mobile: [
 {name:"iPhone", price:"₹60000", img:"https://picsum.photos/200?1"},
 {name:"Samsung", price:"₹50000", img:"https://picsum.photos/200?2"}
],
electronics: [
 {name:"Laptop", price:"₹55000", img:"https://picsum.photos/200?3"}
],
school: [
 {name:"Bag", price:"₹800", img:"https://picsum.photos/200?4"}
]
};

// SAVE
function saveData(){
    localStorage.setItem("products", JSON.stringify(products));
}

// PAGE
function show(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

// LOGIN
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(u==="admin" && p==="1234"){
        document.getElementById("menu").style.display="block";
        show("admin");
        loadAdmin();
    }
    else if(u==="guest" && p==="1234"){
        document.getElementById("menu").style.display="block";
        products = JSON.parse(localStorage.getItem("products")) || products;
        showCategory('mobile');
    }
    else{
        alert("Invalid Login");
    }
}

// LOGOUT
function logout(){
    location.reload();
}

// SHOW PRODUCTS
function showCategory(cat){
    let list=document.getElementById("productList");
    list.innerHTML="";

    products = JSON.parse(localStorage.getItem("products")) || products;

    products[cat].forEach(p=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price}</p>
        <button onclick="buy()">Buy Now</button>
        `;

        list.appendChild(div);
    });

    show("home");
}

// BUY
function buy(){
    alert("Order Placed Successfully!");
}

// ADMIN
function addProduct(){
    let name=document.getElementById("pname").value;
    let price=document.getElementById("pprice").value;
    let img=document.getElementById("pimg").value;
    let cat=document.getElementById("pcat").value;

    if(name && price && img){
        products[cat].push({name,price,img});
        saveData();
        loadAdmin();
    }
}

function loadAdmin(){
    let div=document.getElementById("adminList");
    div.innerHTML="";

    for(let cat in products){
        products[cat].forEach((p,i)=>{
            let d=document.createElement("div");
            d.className="card";

            d.innerHTML=`
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button onclick="deleteProduct('${cat}',${i})">Delete</button>
            `;

            div.appendChild(d);
        });
    }
}

function deleteProduct(cat,i){
    products[cat].splice(i,1);
    saveData();
    loadAdmin();
}

</script>

</body>
</html>
