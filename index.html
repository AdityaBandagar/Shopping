<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Shopping</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* NAV */
.nav{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

/* LOGIN */
.login-box{
    max-width:300px;
    margin:80px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* MENU */
.menu{
    display:none;
    text-align:center;
    background:white;
    padding:10px;
}

.menu button{
    padding:10px;
    margin:5px;
}

/* GRID RESPONSIVE */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    padding:15px;
}

/* CARD */
.card{
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

button{
    padding:8px;
    margin-top:5px;
    cursor:pointer;
}

/* PAGE */
.page{display:none;}
.active{display:block;}
</style>

</head>

<body>

<div class="nav">🛒 Pro Shopping</div>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="login-box">
<h2>Login</h2>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
<button onclick="showCategory('mobile')">Mobiles</button>
<button onclick="showCategory('electronics')">Electronics</button>
<button onclick="showCategory('school')">School</button>
<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2 style="text-align:center;">Admin Panel</h2>

<div style="text-align:center;">
<input id="pname" placeholder="Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">

<select id="pcat">
<option value="mobile">Mobile</option>
<option value="electronics">Electronics</option>
<option value="school">School</option>
</select>

<br><br>
<button onclick="addProduct()">Add</button>
</div>

<div class="products" id="adminList"></div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="products" id="productList"></div>
</div>

<script>

/* ================= DATA ================= */
function getProducts(){
    return JSON.parse(localStorage.getItem("products")) || {
        mobile:[],
        electronics:[],
        school:[]
    };
}

function saveProducts(data){
    localStorage.setItem("products",JSON.stringify(data));
}

/* ================= SESSION (ONE LOGIN) ================= */
function setSession(user){
    localStorage.setItem("loginUser",user);
}

function getSession(){
    return localStorage.getItem("loginUser");
}

function clearSession(){
    localStorage.removeItem("loginUser");
}

/* ================= PAGE ================= */
function show(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

/* ================= LOGIN ================= */
function login(){
    let u=document.getElementById("user").value;
    let p=document.getElementById("pass").value;

    if(getSession()){
        alert("Already logged in on another device!");
        return;
    }

    if(u==="admin" && p==="1234"){
        setSession("admin");
        document.getElementById("menu").style.display="block";
        show("admin");
        loadAdmin();
    }
    else if(u==="guest" && p==="1234"){
        setSession("guest");
        document.getElementById("menu").style.display="block";
        showCategory("mobile");
    }
    else{
        alert("Wrong Login");
    }
}

/* ================= LOGOUT ================= */
function logout(){
    clearSession();
    location.reload();
}

/* ================= SHOW PRODUCTS ================= */
function showCategory(cat){
    let list=document.getElementById("productList");
    list.innerHTML="";

    let products=getProducts();

    products[cat].forEach(p=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price}</p>
        <button onclick="buy()">Buy</button>
        `;

        list.appendChild(div);
    });

    show("home");
}

/* ================= BUY ================= */
function buy(){
    alert("Order Placed!");
}

/* ================= ADMIN ================= */
function addProduct(){
    let products=getProducts();

    let name=document.getElementById("pname").value;
    let price=document.getElementById("pprice").value;
    let img=document.getElementById("pimg").value;
    let cat=document.getElementById("pcat").value;

    if(name && price && img){
        products[cat].push({name,price,img});
        saveProducts(products);
        loadAdmin();
    }
}

/* ================= ADMIN LOAD ================= */
function loadAdmin(){
    let products=getProducts();
    let div=document.getElementById("adminList");
    div.innerHTML="";

    for(let cat in products){
        products[cat].forEach((p,i)=>{
            let d=document.createElement("div");
            d.className="card";

            d.innerHTML=`
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button onclick="deleteProduct('${cat}',${i})">Delete</button>
            `;

            div.appendChild(d);
        });
    }
}

/* ================= DELETE ================= */
function deleteProduct(cat,i){
    let products=getProducts();

    products[cat].splice(i,1);
    saveProducts(products);
    loadAdmin();
}

/* ================= AUTO LOGIN CHECK ================= */
window.onload=function(){
    let user=getSession();

    if(user){
        document.getElementById("menu").style.display="block";

        if(user==="admin"){
            show("admin");
            loadAdmin();
        }else{
            showCategory("mobile");
        }
    }
}

</script>

</body>
</html>
