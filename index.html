<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Shopping</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

/* NAV */
.nav{
    background:#111;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

/* MENU */
.menu{
    display:none;
    text-align:center;
    background:white;
    padding:10px;
}

.menu button{
    padding:10px;
    margin:5px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:5px;
}

/* LOGIN */
.login-box{
    max-width:300px;
    margin:80px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

/* GRID */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    padding:10px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* 🔥 IMAGE FIX */
.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}

/* BUTTON */
button{
    padding:8px;
    margin-top:8px;
    cursor:pointer;
}

/* PAGE */
.page{display:none;}
.active{display:block;}
</style>

</head>

<body>

<div class="nav">🛒 Pro Shopping</div>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="login-box">
<h2>Login</h2>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>
</div>
</div>

<!-- MENU -->
<div id="menu" class="menu">
<button onclick="showCategory('mobile')">Mobiles</button>
<button onclick="showCategory('electronics')">Electronics</button>
<button onclick="showCategory('school')">School</button>
<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2 style="text-align:center;">Admin Panel</h2>

<div style="text-align:center;">
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<select id="pcat">
<option value="mobile">Mobile</option>
<option value="electronics">Electronics</option>
<option value="school">School</option>
</select>
<br><br>
<button onclick="addProduct()">Add</button>
</div>

<div class="products" id="adminList"></div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="products" id="productList"></div>
</div>

<script>

/* ===== DEFAULT DATA ===== */
let defaultData={
mobile:[
{name:"iPhone",price:"₹60000",img:"https://picsum.photos/200?1"}
],
electronics:[],
school:[]
};

if(!localStorage.getItem("products")){
    localStorage.setItem("products",JSON.stringify(defaultData));
}

/* ===== GET / SAVE ===== */
function getProducts(){
    return JSON.parse(localStorage.getItem("products"));
}

function saveProducts(data){
    localStorage.setItem("products",JSON.stringify(data));
}

/* ===== PAGE ===== */
function show(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
}

/* ===== LOGIN ===== */
function login(){
    let u=user.value;
    let p=pass.value;

    if(u==="admin" && p==="1234"){
        menu.style.display="block";
        show("admin");
        loadAdmin();
    }
    else if(u==="guest" && p==="1234"){
        menu.style.display="block";
        showCategory("mobile");
    }
    else{
        alert("Wrong login");
    }
}

/* ===== LOGOUT ===== */
function logout(){
    location.reload();
}

/* ===== SHOW PRODUCTS ===== */
function showCategory(cat){
    let list=document.getElementById("productList");
    list.innerHTML="";

    let products=getProducts(); // 🔥 ALWAYS latest

    products[cat].forEach(p=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price}</p>
        <button onclick="buy()">Buy</button>
        `;

        list.appendChild(div);
    });

    show("home");
}

/* ===== BUY ===== */
function buy(){
    alert("Order Placed");
}

/* ===== ADD ===== */
function addProduct(){
    let products=getProducts();

    let name=pname.value;
    let price=pprice.value;
    let img=pimg.value;
    let cat=pcat.value;

    if(name && price && img){
        products[cat].push({name,price,img});
        saveProducts(products);

        pname.value="";
        pprice.value="";
        pimg.value="";

        loadAdmin();
        alert("Added successfully");
    }
}

/* ===== ADMIN LOAD ===== */
function loadAdmin(){
    let products=getProducts();
    let div=document.getElementById("adminList");
    div.innerHTML="";

    for(let cat in products){
        products[cat].forEach((p,i)=>{
            let d=document.createElement("div");
            d.className="card";

            d.innerHTML=`
            <img src="${p.img}">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            <button onclick="deleteProduct('${cat}',${i})">Delete</button>
            `;

            div.appendChild(d);
        });
    }
}

/* ===== DELETE ===== */
function deleteProduct(cat,i){
    let products=getProducts();

    products[cat].splice(i,1);
    saveProducts(products);
    loadAdmin();
}

</script>

</body>
</html>
